syntax = "proto3";
package agentcage.assessment.v1;
option go_package = "github.com/okedeji/agentcage/api/proto";

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

import "api/proto/cage.proto";

service AssessmentService {
  rpc CreateAssessment(CreateAssessmentRequest) returns (CreateAssessmentResponse);
  rpc GetAssessment(GetAssessmentRequest) returns (GetAssessmentResponse);
  rpc ListAssessments(ListAssessmentsRequest) returns (ListAssessmentsResponse);
  rpc CancelAssessment(CancelAssessmentRequest) returns (CancelAssessmentResponse);
  rpc FinishAssessment(FinishAssessmentRequest) returns (FinishAssessmentResponse);
  rpc GetReport(GetReportRequest) returns (GetReportResponse);
}

enum AssessmentStatus {
  ASSESSMENT_STATUS_UNSPECIFIED = 0;
  ASSESSMENT_STATUS_DISCOVERY = 1;
  ASSESSMENT_STATUS_EXPLOITATION = 2;
  ASSESSMENT_STATUS_VALIDATION = 3;
  ASSESSMENT_STATUS_PENDING_REVIEW = 4;
  ASSESSMENT_STATUS_APPROVED = 5;
  ASSESSMENT_STATUS_REJECTED = 6;
  ASSESSMENT_STATUS_FAILED = 7;
  ASSESSMENT_STATUS_UNREVIEWED = 8;
  ASSESSMENT_STATUS_AWAITING_PLAN_APPROVAL = 9;
  ASSESSMENT_STATUS_PLAN_UNAPPROVED = 10;
  ASSESSMENT_STATUS_ENRICHMENT = 11;
  ASSESSMENT_STATUS_REPORT_GENERATION = 12;
}

message CageTypeConfig {
  agentcage.cage.v1.CageType type = 1;
  agentcage.cage.v1.ResourceLimits defaults = 2;
  int32 max_batch_size = 3;
  google.protobuf.Duration max_duration = 4;
}

message AssessmentConfig {
  string customer_id = 1;
  agentcage.cage.v1.TargetScope scope = 2;
  repeated CageTypeConfig cage_type_configs = 3;
  int64 total_token_budget = 4;
  google.protobuf.Duration max_duration = 5;
  Guidance guidance = 8;
  repeated string skip_paths = 9;
  map<string, string> tags = 11;
  NotificationConfig notifications = 12;
  string name = 13;
  int32 max_total_cages = 14;
  int32 max_iterations = 17;
  map<string, string> environment = 18;
  Workflow workflow = 19;
  // credentials_key references a Vault entry holding the target
  // credentials JSON. The orchestrator resolves it at cage spawn; the
  // value never appears in the proto, the assessment row, or the
  // audit log.
  string credentials_key = 20;
}

// Workflow controls pipeline gates that are operator-toggleable but
// not part of attack guidance. Wrapped (not flat bools on
// AssessmentConfig) so future gates can be added without proto field
// churn.
message Workflow {
  // require_plan_approval=true (default) pauses the assessment after
  // discovery on a plan_approval intervention; false runs the
  // generated plan immediately.
  bool require_plan_approval = 1;
  // identify_in_requests=true (default) injects an X-Agentcage-Pentest
  // header on every cage-originated request to the target, identifying
  // the traffic as authorized pentest activity. Set false for
  // adversarial-simulation engagements that deliberately test the
  // target's detection capability.
  bool identify_in_requests = 2;
  bool no_judge = 3;
}

// PlanProposal is the orchestrator-generated exploitation plan
// surfaced on a plan_approval intervention. Serialized as the
// intervention's context_data.
message PlanProposal {
  string goal = 1;
  string summary = 2;
  repeated PlanAction actions = 3;
  int32 estimated_cages = 4;
  int64 estimated_tokens = 5;
  string notes = 6;
}

message PlanAction {
  string endpoint = 1;
  string vuln_class = 2;
  string objective = 3;
}

message NotificationConfig {
  string webhook = 1;
  bool on_finding = 2;
  bool on_complete = 3;
}

message Guidance {
  AttackSurfaceGuidance attack_surface = 1;
  AttackStrategyGuidance attack_strategy = 3;
}

message AttackSurfaceGuidance {
  repeated string endpoints = 1;
  repeated string api_specs = 2;
  bool limit_to_listed = 3;
}

message AttackStrategyGuidance {
  repeated string known_weaknesses = 1;
  string context = 2;
}

message AssessmentStats {
  int32 total_cages = 1;
  int32 active_cages = 2;
  int32 findings_candidate = 3;
  int32 findings_validated = 4;
  int32 findings_rejected = 5;
  int64 tokens_consumed = 6;
}

message AssessmentInfo {
  string assessment_id = 1;
  string customer_id = 2;
  AssessmentStatus status = 3;
  AssessmentConfig config = 4;
  AssessmentStats stats = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateAssessmentRequest {
  AssessmentConfig config = 1;
  string bundle_ref = 2;
}

message CreateAssessmentResponse {
  AssessmentInfo assessment = 1;
}

message GetAssessmentRequest {
  string assessment_id = 1;
}

message GetAssessmentResponse {
  AssessmentInfo assessment = 1;
}

message ListAssessmentsRequest {
  AssessmentStatus status_filter = 1;
  int32 limit = 2;
  string page_token = 3;
}

message ListAssessmentsResponse {
  repeated AssessmentInfo assessments = 1;
  string next_page_token = 2;
}

message GetReportRequest {
  string assessment_id = 1;
}

message GetReportResponse {
  bytes report_json = 1;
}

message CancelAssessmentRequest {
  string assessment_id = 1;
}

message CancelAssessmentResponse {
  bool cancelled = 1;
}

message FinishAssessmentRequest {
  string assessment_id = 1;
}

message FinishAssessmentResponse {}
