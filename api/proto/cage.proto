syntax = "proto3";
package agentcage.cage.v1;
option go_package = "github.com/okedeji/agentcage/api/proto";

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

service CageService {
  rpc CreateCage(CreateCageRequest) returns (CreateCageResponse);
  rpc GetCage(GetCageRequest) returns (GetCageResponse);
  rpc ListCagesByAssessment(ListCagesByAssessmentRequest) returns (ListCagesByAssessmentResponse);
  rpc DestroyCage(DestroyCageRequest) returns (DestroyCageResponse);
  rpc GetCageLogs(GetCageLogsRequest) returns (GetCageLogsResponse);
  rpc StreamCageLogs(StreamCageLogsRequest) returns (stream StreamCageLogsResponse);
}

enum CageType {
  CAGE_TYPE_UNSPECIFIED = 0;
  CAGE_TYPE_DISCOVERY = 1;
  CAGE_TYPE_VALIDATOR = 2;
  CAGE_TYPE_EXPLOITATION = 4;
}

enum CageState {
  CAGE_STATE_UNSPECIFIED = 0;
  CAGE_STATE_PENDING = 1;
  CAGE_STATE_PROVISIONING = 2;
  CAGE_STATE_RUNNING = 3;
  CAGE_STATE_PAUSED = 4;
  CAGE_STATE_TEARING_DOWN = 5;
  CAGE_STATE_COMPLETED = 6;
  CAGE_STATE_FAILED = 7;
}

message TargetScope {
  string host = 1;
  repeated string ports = 2;
  repeated string paths = 3;
  repeated string extras = 4;
}

message ResourceLimits {
  int32 vcpus = 1;
  int32 memory_mb = 2;
}

message TimeLimits {
  google.protobuf.Duration max_duration = 1;
}

message RateLimits {
  int32 requests_per_second = 1;
}

enum RoutingStrategy {
  ROUTING_STRATEGY_UNSPECIFIED = 0;
  ROUTING_STRATEGY_COST_OPTIMIZED = 1;
  ROUTING_STRATEGY_QUALITY_FIRST = 2;
  ROUTING_STRATEGY_LATENCY_FIRST = 3;
}

message LLMGatewayConfig {
  int64 token_budget = 1;
  RoutingStrategy routing_strategy = 2;
}

message PayloadProxyConfig {
  string judge_endpoint = 1;
  double judge_confidence = 2;
  int32 judge_timeout_seconds = 3;
}

message CageConfig {
  string assessment_id = 1;
  CageType type = 2;
  TargetScope scope = 3;
  ResourceLimits resources = 4;
  TimeLimits time_limits = 5;
  RateLimits rate_limits = 6;
  optional LLMGatewayConfig llm_gateway = 7;
  PayloadProxyConfig proxy_config = 8;
  string parent_finding_id = 9;
}

message CageInfo {
  string cage_id = 1;
  string assessment_id = 2;
  CageType type = 3;
  CageState state = 4;
  CageConfig config = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  string error = 8;
}

message CreateCageRequest {
  CageConfig config = 1;
}

message CreateCageResponse {
  CageInfo cage = 1;
}

message GetCageRequest {
  string cage_id = 1;
}

message GetCageResponse {
  CageInfo cage = 1;
}

message ListCagesByAssessmentRequest {
  string assessment_id = 1;
}

message ListCagesByAssessmentResponse {
  repeated string cage_ids = 1;
}

message GetCageLogsRequest {
  string cage_id = 1;
  int32 tail_lines = 2;
  bool serial = 3;
}

message GetCageLogsResponse {
  repeated string lines = 1;
  bool is_running = 2;
}

message StreamCageLogsRequest {
  string cage_id = 1;
  int32 tail_lines = 2;
  string source_filter = 3;
}

message StreamCageLogsResponse {
  string line = 1;
  bool completed = 2;
  string cage_state = 3;
}

message DestroyCageRequest {
  string cage_id = 1;
  string reason = 2;
}

message DestroyCageResponse {}
