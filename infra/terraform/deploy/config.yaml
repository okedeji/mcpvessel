posture: dev
# llm.endpoint and judge.endpoint are set after deploy via:
#   agentcage connect $(terraform output -raw grpc_addr) --insecure
#   agentcage config set llm.endpoint $(terraform output -raw webhook_endpoint)
#   agentcage config set judge.endpoint $(terraform output -raw webhook_judge_endpoint)
llm:
  endpoint: ""
# Judge is optional. Without it, agents that set X-Agentcage-Judge=required
# (or cages spawned with coordinator's recommended_judge=true) fall through
# to payload-review interventions instead of automated review.
judge:
  endpoint: ""
  confidence_threshold: 0.7
  timeout: 10s
assessment:
  # Headroom for 1 discovery + ~8 exploitation (one per vuln class) +
  # a few validation cages. The Defaults() ceiling is 50; this template
  # picks a tighter number tuned to a single-host dev deploy.
  max_total_cages: 20
